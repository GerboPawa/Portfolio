<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Filippo Gerbino</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0A0A0F" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .nf-logo {
      position: fixed; top: 1.5rem; left: 2rem;
      font-family: var(--font-display); font-size: 1.6rem; font-weight: 600;
    }
    .nf-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem; gap: 0.4rem;
    }
    .nf-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 18vw, 11rem);
      font-weight: 300; color: var(--gold); line-height: 1;
    }
    .nf-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 300; color: var(--white); margin-bottom: 0.5rem;
    }
    .nf-sub {
      color: var(--mist); font-size: 0.78rem; letter-spacing: 0.04em;
      line-height: 1.7; margin-bottom: 2rem; max-width: 440px;
    }
  </style>
</head>
<body>
  <a href="/" class="nf-logo">F<span class="gold">.</span></a>
  <main class="nf-wrap">
    <div class="nf-code">404</div>
    <h1 class="nf-title">This page got lost in the mix.</h1>
    <p class="nf-sub mono">The track you're looking for isn't here.<br/>Questa pagina non esiste o è stata spostata.</p>
    <a href="/" class="btn-primary">Back to home</a>
  </main>

  <!-- Analytics — privacy-friendly & cookieless (GoatCounter) -->
  <script data-goatcounter="https://gerbino.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
